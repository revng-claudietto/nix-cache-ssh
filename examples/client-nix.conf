# Client configuration to CONSUME the two caches.
# Drop into /etc/nix/nix.conf (or translate to NixOS nix.settings.* / a flake's
# nixConfig). Replace hostnames and the two public keys printed by
# server/setup-server.sh.

# Both caches are read directly over HTTPS — no proxy. The private cache is
# authenticated with netrc (see netrc.example): vanilla `nix` sends the GitLab
# token as the HTTP Basic password, which the server validates against GitLab.
substituters = https://cache.example.com https://cache-internal.example.com https://cache.nixos.org

trusted-public-keys = cache.example.com-1:REPLACE_WITH_PUBLIC_PUB cache-internal.example.com-1:REPLACE_WITH_PRIVATE_PUB cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

# Where nix reads HTTP Basic credentials for the private cache.
netrc-file = /etc/nix/netrc

# Optional: don't fail a build if a cache is unreachable.
fallback = true
