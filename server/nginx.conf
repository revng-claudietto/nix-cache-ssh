# Two Nix binary caches served as plain static files by nginx.
#
#   public  cache  ->  /srv/nix-cache/public      (no auth)
#   private cache  ->  /srv/nix-cache/private      (GitLab token gated)
#
# Both directories are written *and signed on upload* over SSH (see
# client/push.sh + server/setup-server.sh). nginx never reads a live
# /nix/store and runs no cache daemon — it only serves the prepared files.
#
# Auth model (no proxy, no njs/lua, no token decoding):
#   A vanilla `nix` client authenticates to a substituter with netrc, i.e.
#   HTTP Basic: "Authorization: Basic base64(user:TOKEN)". GitLab's REST API
#   rejects Basic, but GitLab's *git-over-HTTPS* endpoint accepts a GitLab
#   token as the Basic password. So we forward the client's Authorization
#   header UNCHANGED to a git endpoint; GitLab answers 200 for a valid token
#   with read access to that repo, 401 otherwise. The chosen repo doubles as
#   the ACL: grant it read access to whoever may use the private cache.
#   (Personal/project/group access tokens and CI_JOB_TOKEN all work here.)
#
# Replace the placeholders before use:
#   cache.example.com           public cache hostname
#   cache-internal.example.com  private cache hostname
#   gitlab.example.com          your GitLab instance (gitlab.com or self-hosted)
#   grp/nix-cache-acl           the GitLab project whose read access gates the cache
#   /srv/nix-cache/{public,private}   cache dirs created by setup-server.sh

# Cache the GitLab verdict per credential: a single `nix` build fetches many
# narinfo + nar objects, and without this each one would hit GitLab.
proxy_cache_path /var/cache/nginx/gitlab-auth levels=1:2
                 keys_zone=gitlab_auth:1m max_size=16m inactive=10m use_temp_path=off;

############################################################
# PUBLIC cache — static files, world-readable
############################################################
server {
    listen 80;
    # Recommended in production — terminate TLS here:
    # listen 443 ssl http2;
    # ssl_certificate     /etc/ssl/cache.example.com/fullchain.pem;
    # ssl_certificate_key /etc/ssl/cache.example.com/key.pem;
    server_name cache.example.com;

    root /srv/nix-cache/public;
    autoindex off;
    server_tokens off;

    # NARs are content-addressed and immutable -> cache hard.
    location /nar/ {
        try_files $uri =404;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # nix-cache-info + *.narinfo: small and may be re-signed, so don't pin them.
    location / {
        try_files $uri =404;
    }
}

############################################################
# PRIVATE cache — static files behind a GitLab token check
############################################################
server {
    listen 80;
    # STRONGLY recommended: without TLS the token (Basic password) is in cleartext.
    # listen 443 ssl http2;
    # ssl_certificate     /etc/ssl/cache-internal.example.com/fullchain.pem;
    # ssl_certificate_key /etc/ssl/cache-internal.example.com/key.pem;
    server_name cache-internal.example.com;

    root /srv/nix-cache/private;
    autoindex off;
    server_tokens off;

    # Gate every read on a valid GitLab token.
    location /nar/ {
        auth_request /_gitlab_auth;
        try_files $uri =404;
        expires max;
        add_header Cache-Control "private, immutable";
    }
    location / {
        auth_request /_gitlab_auth;
        try_files $uri =404;
    }

    # Internal subrequest: forward the caller's Authorization header UNCHANGED
    # to GitLab's git smart-HTTP endpoint. GitLab validates the token (as the
    # Basic password) and its read access to grp/nix-cache-acl.
    #   200       -> token valid + has read access  -> allow
    #   401 / 403 -> missing / invalid / no access   -> deny
    location = /_gitlab_auth {
        internal;

        # No credential -> reject without bothering GitLab.
        if ($http_authorization = "") { return 401; }

        proxy_pass https://gitlab.example.com/grp/nix-cache-acl.git/info/refs?service=git-upload-pack;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        # Pass the client's "Authorization: Basic ..." straight through.
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host gitlab.example.com;
        # Some GitLab setups are picky about the git UA on this endpoint.
        proxy_set_header User-Agent "git/2.40";

        # Verify GitLab's certificate (recommended). Point at your CA bundle:
        proxy_ssl_server_name on;
        # proxy_ssl_verify on;
        # proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

        proxy_cache gitlab_auth;
        proxy_cache_key $http_authorization;   # one verdict per distinct credential
        proxy_cache_valid 200 5m;
        proxy_cache_valid 401 403 30s;
    }
}
